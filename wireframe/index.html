<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
  font-family: sans;
  padding: 10px;
}
svg path{
  stroke: #000;
  stroke-width: 1px;
  /*stroke: rgba(0,0,0,1);*/
}
svg{
  border: 1px solid #DED8BF;
  background-color: #000000 ;
  width: 1200px;
  height: 720px;
}
h1{
  font-weight: normal;
  margin: 0;
  padding-left: 5px;
  color: #53483e;
}
p{
  margin: 0;
  margin-bottom: 10px;
  padding-left: 5px;
  color: #917e6b;
}
ul{
  width: 200px;
  float: left;
  list-style-type: none;
  margin: 0;
  padding: 0;
  padding-right: 10px;
}
li{
  cursor: pointer;
  background-color: #c8ad93;
  padding: 10px;
  margin: 2px;
  color: #fff;
}
</style>
</head>
<body>
  <script src="http://d3js.org/d3.v3.min.js"></script>
  <script src="https://d3js.org/d3-color.v0.4.min.js"></script>
  <script src="surface3d.js"></script>
  <script src="noise.js"></script>
  <script src="noisegenerator.js"></script>
  <script>
  var yaw=0.5,pitch=0.5, width=1200, height=720, drag=false;

  //width, height, seed, scale, octaves, persistance, lacunarity, offset)
  heightmap = Generate(20, 20, 0, 10, 1, .5, 2, [0,0]);
  scale = 100;
  function dataFromFormular(func){
    var output=[];
    for(var x=0;x<20;x++){
      var f0=[];            
      output.push(f0);
      for(var y=0;y<20;y++){
          f0.push(1-heightmap[x][y] * scale);
      }
    }
    return output;
  }

  var svg=d3.select('body')
          .append('svg')
            .attr('height',height)
            .attr('width',width);

  var group = svg.append("g");

  var md=group.data([dataFromFormular()])
    .surface3D(width,height)
      .surfaceHeight(function(d){ 
        return d;
      }).surfaceColor(function(d){
        var c=d3.hsl((d+100), 0.6, 0.5).rgb();
        //var c = d3.hsl("steelblue"); 
        var strr = "rgba("+parseInt(c.r)+","+parseInt(c.g)+","+parseInt(c.b)+", 0)";
        //console.log(strr);
        return strr;
      }).strokeColor(function(d){
        var c=d3.hsl((d+100), 0.6, 0.5).rgb();
        //var c = d3.hsl("steelblue"); 
        var strr = "rgba("+parseInt(c.r)+","+parseInt(c.g)+","+parseInt(c.b)+", 1)";
        //console.log(strr);
        return strr;
      });
  svg.on("mousedown",function(){
    drag=[d3.mouse(this),yaw,pitch];
  }).on("mouseup",function(){
    drag=false;
  }).on("mousemove",function(){
    if(drag){            
      var mouse=d3.mouse(this);
      yaw=drag[1]-(mouse[0]-drag[0][0])/50;
      pitch=drag[2]+(mouse[1]-drag[0][1])/50;
      pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch));
      md.turntable(yaw,pitch);
    }
  });
  
  </script>
</body>
</html>
